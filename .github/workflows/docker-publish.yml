name: Build and Publish Custom OmniRoute

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # GitHub pakai zona waktu UTC. 
    # Jam 17:00 UTC = Jam 00:00 WIB (Tengah Malam di Jakarta)
    - cron: '0 17 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Bikin tag 'latest' otomatis menimpa yang lama
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # DUA BARIS SAKTI ANTI-AMNESIA/ANTI-MALAS:
          pull: true      # Memaksa Docker narik image 'omniroute:latest' & 'node:22-slim' paling baru dari server
          no-cache: true  # Memaksa Docker nge-run 'npm install -g openclaw' dari nol biar dapet versi ter-update
